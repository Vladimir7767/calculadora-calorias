<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calculadora de Calorías e IMC Online Gratis</title>
<meta name="description" content="Calculadora de calorías e IMC online fácil y gratuita. Calcule su índice de masa corporal y su tasa metabólica basal al instante en 1 clic.">
<style>
body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:#fff;padding:25px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.05);max-width:440px;width:100%;text-align:center}
select,input{width:100%;padding:10px;margin:6px 0;border:1px solid #cbd5e1;border-radius:6px;box-sizing:border-box;font-size:14px}
button{width:100%;padding:12px;background:#0284c7;border:none;color:#fff;font-weight:bold;border-radius:6px;cursor:pointer;margin-top:8px}
.res{margin-top:15px;padding:15px;display:none;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;text-align:left;font-size:14px;line-height:1.5}
.ad{display:none;margin-top:15px;min-height:100px;text-align:center}
</style>
</head>
<body>
<div class="box">
<h2>Calorías e IMC</h2>
<select id="gen"><option value="m">Masculino</option><option value="f">Femenino</option></select>
<input type="number" id="w" placeholder="Peso (kg)">
<input type="number" id="h" placeholder="Altura (cm)">
<input type="number" id="a" placeholder="Edad (años)">
<button onclick="calcHealth()">Calcular Resultados</button>
<div id="res" class="res"></div>
<div id="ads" class="ad"><div id="container-e8c895e6c70ade8e4ef4a72354f42e97"></div></div>
</div>
<script>
function showAds(){
const c=document.getElementById('ads');
if(!window.adScriptLoaded){
window.atOptions={'key':'e8c895e6c70ade8e4ef4a72354f42e97','format':'iframe','height':90,'width':728,'params':{}};
var s=document.createElement('script');s.type='text/javascript';s.async=!0;
s.src=['https://','bagelstoppage.','com/','e8c895e6c70ade8e4ef4a72354f42e97/','invoke.js'].join('');c.appendChild(s);window.adScriptLoaded=!0
}c.style.display='block'
}
function calcHealth(){
const g=document.getElementById('gen').value,w=parseFloat(document.getElementById('w').value),h=parseFloat(document.getElementById('h').value),a=parseFloat(document.getElementById('a').value),r=document.getElementById('res');
if(isNaN(w)||isNaN(h)||isNaN(a)){alert('Por favor, complete todos los campos.');return}
const imc=w/((h/100)*(h/100));
let bmr=(g==='m')?(10*w)+(6.25*h)-(5*a)+5:(10*w)+(6.25*h)-(5*a)-161;
r.innerHTML='<strong>Índice de Masa Corporal (IMC):</strong> '+imc.toFixed(1)+'<br><strong>Calorías Base Diarias:</strong> '+Math.round(bmr)+' kcal';
r.style.display='block';showAds()
}
</script>
</body>
</html>
